name: Deploy Seguridad API to Azure

env:
  AZURE_WEBAPP_NAME: SEGURIDADVEHICULOSJORDY
  DOTNET_VERSION: '8.0'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Seguridad.API/**'
      - '.github/workflows/Seguridad.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: |
          cd Seguridad.API
          dotnet restore Abstracciones/Abstracciones.csproj
          dotnet restore DA/DA.csproj
          dotnet restore Flujo/Flujo.csproj
          dotnet restore Reglas/Reglas.csproj
          dotnet restore API/API.csproj

      - name: Build projects
        run: |
          cd Seguridad.API
          dotnet build Abstracciones/Abstracciones.csproj --configuration Release --no-restore
          dotnet build DA/DA.csproj --configuration Release --no-restore
          dotnet build Flujo/Flujo.csproj --configuration Release --no-restore
          dotnet build Reglas/Reglas.csproj --configuration Release --no-restore
          dotnet build API/API.csproj --configuration Release --no-restore

      - name: Run tests
        run: |
          cd Seguridad.API
          dotnet test API/API.csproj --no-restore --configuration Release || echo "No tests found"

      - name: Publish Seguridad API
        run: dotnet publish Seguridad.API/API/API.csproj -c Release -o ./publish --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seguridad-api
          path: ./publish

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: SEGURIDAD
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: seguridad-api

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.SEGURIDADJORDY_PROFILE }}
          package: .