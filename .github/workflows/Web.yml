name: Build and deploy Web App

env:
  AZURE_WEBAPP_NAME: webjordy
  DOTNET_VERSION: '8.0'

on:
  push:
    branches: [ "main" ]  # Se ejecuta en cualquier push a main
  workflow_dispatch:       # Permite ejecución manual

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # 🔹 Restore solo el proyecto Web
      - name: Restore dependencies
        run: dotnet restore Vehiculos.WEB/Web/Web.csproj

      # 🔹 Build (esto compila sus dependencias automáticamente)
      - name: Build Web Project
        run: dotnet build Vehiculos.WEB/Web/Web.csproj --configuration Release --no-restore

      - name: Run tests (if any)
        run: dotnet test Vehiculos.WEB/Web/Web.csproj --no-restore --configuration Release || echo "No tests found"

      # 🔹 Publish SOLO el proyecto Web
      - name: Publish Web Project
        run: dotnet publish Vehiculos.WEB/Web/Web.csproj -c Release -o ./publish --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: WebProduction
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.WEBJORDY_PROFILE }}
          package: .
